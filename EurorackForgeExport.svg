<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Simple Export Icon</title>
  <desc id="desc">A simple dark mode export icon with a clean upward arrow and tray.</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="64" x2="416" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#171d27"/>
      <stop offset="0.55" stop-color="#0b1018"/>
      <stop offset="1" stop-color="#05070b"/>
    </linearGradient>
    <linearGradient id="stroke" x1="118" y1="98" x2="394" y2="414" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8993a3" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3a4350" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="mark" x1="184" y1="116" x2="330" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#e3e8f0"/>
      <stop offset="1" stop-color="#aab4c3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="markShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="48" y="48" width="416" height="416" rx="92" fill="url(#bg)"/>
  <rect x="61" y="61" width="390" height="390" rx="82" fill="none" stroke="url(#stroke)" stroke-width="2"/>

  <g filter="url(#shadow)">
    <path d="M144 324v52c0 22 18 40 40 40h144c22 0 40-18 40-40v-52" fill="none" stroke="#6f7887" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"/>
    <path d="M144 324v52c0 22 18 40 40 40h144c22 0 40-18 40-40v-52" fill="none" stroke="url(#mark)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#markShadow)">
    <path d="M256 335V118" fill="none" stroke="#6f7887" stroke-width="54" stroke-linecap="round"/>
    <path d="M256 118l-74 74" fill="none" stroke="#6f7887" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M256 118l74 74" fill="none" stroke="#6f7887" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M256 335V118" fill="none" stroke="url(#mark)" stroke-width="38" stroke-linecap="round"/>
    <path d="M256 118l-74 74" fill="none" stroke="url(#mark)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M256 118l74 74" fill="none" stroke="url(#mark)" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
