<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">FreeCAD Eurorack STL Export Icon</title>
  <desc id="desc">A dark mode export icon with an arrow leaving a tray toward an STL file cube.</desc>
  <defs>
    <linearGradient id="metal" x1="120" y1="120" x2="400" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6f8fb"/>
      <stop offset="0.5" stop-color="#d9dde4"/>
      <stop offset="1" stop-color="#a4adba"/>
    </linearGradient>
    <linearGradient id="metalDark" x1="140" y1="148" x2="360" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b95a4"/>
      <stop offset="1" stop-color="#56606f"/>
    </linearGradient>
    <linearGradient id="tray" x1="150" y1="300" x2="362" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a313c"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="292" y1="124" x2="406" y2="212" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d8dee6"/>
    </linearGradient>
    <linearGradient id="cubeSide" x1="350" y1="150" x2="430" y2="286" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a4aebe"/>
      <stop offset="1" stop-color="#5f6877"/>
    </linearGradient>
    <radialGradient id="cubeFront" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#eef2f8"/>
      <stop offset="0.55" stop-color="#ced4de"/>
      <stop offset="1" stop-color="#8f98a8"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#000000"/>

  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="170" fill="#0c1016" opacity="0.72"/>
    <circle cx="256" cy="256" r="168" fill="none" stroke="#6f7886" stroke-opacity="0.35" stroke-width="4"/>

    <path d="M160 322h192c18 0 32 14 32 32v14c0 18-14 32-32 32H160c-18 0-32-14-32-32v-14c0-18 14-32 32-32z" fill="url(#tray)"/>
    <path d="M176 328h160c14 0 26 12 26 26v6c0 14-12 26-26 26H176c-14 0-26-12-26-26v-6c0-14 12-26 26-26z" fill="none" stroke="#aeb6c3" stroke-opacity="0.35" stroke-width="3"/>
    <path d="M168 390h176" stroke="#e9edf3" stroke-opacity="0.36" stroke-width="4" stroke-linecap="round"/>

    <path d="M222 338h68" stroke="#c7ced9" stroke-width="10" stroke-linecap="round"/>
    <path d="M256 184v136" stroke="#c7ced9" stroke-width="12" stroke-linecap="round"/>
    <path d="M256 184l-34 34m34-34l34 34" stroke="#c7ced9" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M302 126l72 40v80l-72 40-72-40v-80z" fill="url(#cubeFront)"/>
    <path d="M302 126l72 40-72 40-72-40z" fill="url(#cubeTop)"/>
    <path d="M374 166v80l-72 40v-80z" fill="url(#cubeSide)"/>
    <path d="M302 126v80l-72 40" fill="none" stroke="#eef2f8" stroke-width="4" opacity="0.8"/>
    <path d="M302 126l72 40" fill="none" stroke="#eef2f8" stroke-width="4" opacity="0.8"/>
    <path d="M302 206l72 40" fill="none" stroke="#5f6877" stroke-width="4" opacity="0.85"/>
    <path d="M374 166l-72 40" fill="none" stroke="#5f6877" stroke-width="4" opacity="0.85"/>
    <path d="M302 206v80" fill="none" stroke="#5f6877" stroke-width="4" opacity="0.85"/>

    <path d="M160 290c34-36 82-56 140-56h28" fill="none" stroke="#f2f4f7" stroke-width="10" stroke-linecap="round" opacity="0.82"/>
    <path d="M320 224l-18-18m18 18l-18 18" fill="none" stroke="#f2f4f7" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.82"/>

    <g fill="#111722" opacity="0.95">
      <circle cx="188" cy="360" r="9"/>
      <circle cx="324" cy="360" r="9"/>
